<html lang="si">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avurudu Predictor 2026 | CN Kodithuwakku</title>
    <style>
        :root {
            --primary-red: #d41d1d;
            --success-green: #28a745;
            --bg-gradient: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
        }

        body { 
            background: var(--bg-gradient); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 30px; 
            max-width: 450px; 
            width: 90%;
            border: 4px solid var(--primary-red); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10; 
        }

        .rainbow-text {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            animation: rainbow-animation 5s linear infinite;
            background-size: 400% 100%;
        }

        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .year-text { color: var(--primary-red); font-size: 1.8rem; display: block; }
        .subtitle { color: #555; margin-bottom: 25px; }

        .btn-main { 
            background-color: var(--primary-red); 
            color: white; padding: 18px 40px; 
            border: none; border-radius: 50px; 
            cursor: pointer; font-size: 1.3rem; font-weight: bold;
            transition: 0.3s;
        }

        .choice-btns { margin-top: 30px; display: none; animation: fadeIn 0.5s; }
        .choice-btns button { 
            margin: 10px; padding: 15px 35px; 
            cursor: pointer; font-size: 1.2rem; 
            border-radius: 15px; border: none; font-weight: bold;
            transition: 0.2s;
        }

        #yes-btn { background-color: var(--success-green); color: white; }
        #no-btn { background-color: #6c757d; color: white; }

        .clear-result {
            position: fixed;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 320px;
            width: 85%;
            font-weight: bold;
            font-size: 1.05rem;
            z-index: 1000;
            pointer-events: none;
            border: 4px solid var(--primary-red);
            animation: popAndFloat 5.5s ease-in-out forwards;
            line-height: 1.5;
        }

        .emoji {
            position: absolute;
            bottom: -50px;
            font-size: 2.5rem;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            animation: moveUp 3s linear forwards;
        }

        .copyright {
            position: absolute;
            bottom: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
            opacity: 0.8;
            cursor: pointer;
        }

        /* Admin Panel Styling */
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 2000;
            border: 2px solid #333;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes popAndFloat {
            0% { transform: scale(0) translateY(100px); opacity: 0; }
            10% { transform: scale(1.1) translateY(0); opacity: 1; }
            85% { transform: scale(1) translateY(-10px); opacity: 1; }
            100% { transform: scale(0.5) translateY(-80px); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
     
  

    <div class="container">
        <div style="font-size: 60px;">🏮</div>
        <div class="rainbow-text">Aluth Avurudu</div>
        <span class="year-text">2026</span>
        <p class="subtitle">ඔබේ අනාගත වාසනාව බලමුද?</p>
        
        <button class="btn-main" id="main-btn" onclick="showChoices()">This is Your Year?</button>

        <div class="choice-btns" id="choices">
            <p style="font-weight: bold;">SELECT YOUR ANSWER:</p>
            <button id="yes-btn" onclick="celebrate('yes')">Yes</button>
            <button id="no-btn" onclick="celebrate('no')">No</button>
        </div>

        <br>
        <a style="cursor:pointer; color:var(--primary-red); font-weight:bold; text-decoration:none; font-size: 0.9rem;" onclick="location.reload()">TRY AGAIN ↺</a>
    </div>

    <div id="admin-panel">
        <h3>Admin Dashboard</h3>
        <p>Total Page Views: <span id="view-count-display">0</span></p>
        <button onclick="closeAdmin()" style="padding: 10px 20px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc;">Close</button>
    </div>

    <div class="copyright" ondblclick="openAdmin()">© CN Kodithuwakku</div>

    <script>
        // View Count එක කළමනාකරණය
        let views = localStorage.getItem('page_views');
        if(views === null) {
            views = 0;
        }
        views++;
        localStorage.setItem('page_views', views);

        function openAdmin() {
            let pass = prompt("Enter Admin Passcode:");
            if (pass === "1234") { // රහස් අංකය 1234 වේ
                document.getElementById('view-count-display').innerText = localStorage.getItem('page_views');
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("වැරදි මුද්‍රිත අංකයක්!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showChoices() {
            document.getElementById('choices').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        function createEmoji(emojiSymbol) {
            const emoji = document.createElement('div');
            emoji.classList.add('emoji');
            emoji.innerText = emojiSymbol;
            emoji.style.left = Math.random() * 95 + "vw";
            emoji.style.animationDuration = (Math.random() * 1.5 + 2) + "s";
            document.body.appendChild(emoji);
            setTimeout(() => { emoji.remove(); }, 3000);
        }

        function displayClearResult(text) {
            const oldResults = document.querySelectorAll('.clear-result');
            oldResults.forEach(r => r.remove());

            const res = document.createElement('div');
            res.classList.add('clear-result');
            res.innerHTML = text;
            
            const isTop = Math.random() > 0.5;
            res.style.top = isTop ? "8vh" : "75vh";
            res.style.left = "50%";
            res.style.transform = "translateX(-50%)";
            res.style.marginLeft = "-160px";

            document.body.appendChild(res);
            setTimeout(() => { res.remove(); }, 5500);
        }

        function celebrate(type) {
            const emojis = type === 'yes' ? ['❤️', '✨', '💎', '🌈', '🏆', '🔥', '💰', '🎓', '✈️', '🌟'] : ['😂', '🥥', '🐒', '🏃‍♂️', '💨', '🐜', '🌧️', '🙈', '🥣', '🤷‍♂️'];
            
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createEmoji(emojis[Math.floor(Math.random() * emojis.length)]);
                }, i * 50);
            }

            const yesAnswers = [
                "✨ <b>සුබ වසරක්!</b> <br>ඔබේ හීන පසුපස හඹා යන්න, මුළු ලෝකයම ඔබට මඟ කියාවි!",
                "🏆 <b>ජයග්‍රහණයේ වසර!</b> <br>කැපවීමෙන් වැඩ කරන්න, මේ වසරේ ලොකුම වාසනාව ඔබටයි!",
                "💎 <b>දිදුලන වසරක්!</b> <br>ඔබේ දක්ෂතාවයෙන් ලෝකයම දිනන වසරක් වේවා!",
                "🌈 <b>දේදුන්නක් වැනි ජීවිතයක්!</b> <br>ප්‍රශ්න හමුවේ නොසැලී ඉදිරියටම යන්න!",
                "🥇 <b>Number One!</b> <br>මේ අවුරුද්දේ හැම දෙයක්ම ඔබට අවශ්‍ය විදියටම සිද්ධ වෙයි!",
                "💰 <b>ධන වාසනාව!</b> <br>ඔබ අත ගසන සෑම දෙයක්ම සාර්ථක වන ධනවත් වසරක් වේවා!",
                "🎓 <b>විභාග ජය!</b> <br>අධ්‍යාපනයෙන් ලොව හෙල්ලීමට ඔබට ශක්තිය ලැබෙන වසරකි!",
                "✈️ <b>විදේශ ගමන්!</b> <br>ඔබ මඟ බලා සිටි ඒ විදේශ ගමන මේ වසරේ සැබෑ වනු ඇත!",
                "🏠 <b>පවුලේ සතුට!</b> <br>නිවසේ සතුට සහ සමගිය පිරී ඉතිරී යන කාලයක් උදා වේ!",
                "🌟 <b>ජනප්‍රියත්වය!</b> <br>සමාජයේ කැපී පෙනෙන චරිතයක් ලෙස ඔබ බැබළෙන වසරකි!"
            ];
            
            const noAnswers = [
                "🤣 <b>මරු පලාඵලයක්!</b> <br>මේ අවුරුද්දේ අවුරුදු උත්සවයේ කණාමුට්ටි බිඳින්නේ ඔබේ ඔළුවෙන්!",
                "🥥 <b>මහා වාසනාවක්!</b> <br>නිවසේ පොල් ගැවීමේ වගකීම සම්පූර්ණයෙන්ම ඔබට හිමිවේ!",
                "🏃‍♂️ <b>පරෙස්සමෙන්!</b> <br>ගෝනි රේස් එක දුවද්දී කකුල පැටලී ඇද වැටීමට නියමිතයි!",
                "🐒 <b>අලුත් ආරංචියක්!</b> <br>ඔබ මේ වසරේදී අවිවාහක වඳුරු හමුදාවක නායකයා ලෙස පත්වේ!",
                "💨 <b>පොඩි ප්‍රශ්නයක්!</b> <br>කොණ්ඩ කැවුම් කද්දී පැණි බෙරී ඇඳුම කැත වීමට නියමිතයි!",
                "🙈 <b>අප්පටසිරි!</b> <br>ඔබේ ක්‍රෂ් එක මේ අවුරුද්දේ ඔබව 'පොල් බූරුවා' කියා අමතනු ඇත!",
                "🐜 <b>කඩිසර බව!</b> <br>ඔබේ ආහාර පිඟානට මේ වසරේ කඩි කුලකයක් සංක්‍රමණය වනු ඇත!",
                "🌧️ <b>කාලගුණ වාර්තාව!</b> <br>අවුරුදු නෑගම් යන සෑම දිනකම ඔබට මහා වැස්සකට තෙමීමට සිදුවේ!",
                "🥣 <b>පොඩි කේස් එකක්!</b> <br>කිරිබත් කද්දී ගලක් හැපී දතක් බිඳීමට ඉඩ ඇත!",
                "🤷‍♂️ <b>වෙලාව තමයි!</b> <br>මේ වසර පුරාම අනුන්ගේ විවාහ මංගල්‍යවල වීඩියෝ කිරීමට ඔබට සිදුවේ!"
            ];

            const list = (type === 'yes') ? yesAnswers : noAnswers;
            const finalResult = list[Math.floor(Math.random() * list.length)];
            
            displayClearResult(finalResult);
        }
    </script>
</body>
</html>
